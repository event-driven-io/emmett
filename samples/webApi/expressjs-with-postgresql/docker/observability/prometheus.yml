global:
  scrape_interval: 5s
  evaluation_interval: 5s

otlp:
  promote_resource_attributes:
    - service.name

scrape_configs:
  - job_name: otel-collector-self
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: emmett
    static_configs:
      - targets: ['otel-collector:8889']
