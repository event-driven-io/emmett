name: Publish to NPM
on: [workflow_dispatch]

defaults:
  run:
    working-directory: src

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version-file: ./src/.nvmrc

      - name: Ensure specific npm version
        run: npm install -g npm@11.9.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Publish packages on NPM 📦
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ $VERSION == *"beta"* ]]; then
            TAG="beta"
          elif [[ $VERSION == *"alpha"* ]]; then
            TAG="alpha"
          elif [[ $VERSION == *"rc"* ]]; then
            TAG="rc"
          else
            TAG="latest"
          fi

          for pkg_dir in packages/*/; do
            if [ ! -f "${pkg_dir}package.json" ]; then
              echo "⏭  ${pkg_dir} has no package.json — skipping"
              continue
            fi

            is_private=$(node -p "require('./${pkg_dir}package.json').private ?? false")
            if [ "$is_private" = "true" ]; then
              echo "⏭  ${pkg_dir} is private — skipping"
              continue
            fi

            pkg_name=$(node -p "require('./${pkg_dir}package.json').name")

            if npm view "${pkg_name}@${VERSION}" version >/dev/null 2>&1; then
              echo "⏭  ${pkg_name}@${VERSION} already published — skipping"
            else
              echo "📦 Publishing ${pkg_name}@${VERSION}"
              npm publish -w "${pkg_dir}" --tag "$TAG" --access public --provenance
            fi
          done
        env:
          NODE_ENV: production
